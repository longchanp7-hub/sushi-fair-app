name: Update and deploy sushi fairs

on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths:
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/update-fairs.yml'
  schedule:
    # 06:17 JST every day (21:17 UTC on previous day)
    - cron: '17 21 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run update
      - run: node scripts/apply-store-overrides.mjs

      - name: Commit updated data when changed
        run: |
          if git diff --quiet -- app/data/fairs.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/data/fairs.json
            git commit -m "Update sushi fair data"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './app'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
