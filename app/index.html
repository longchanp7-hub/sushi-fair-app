<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10131a" />
  <meta name="description" content="スシロー・はま寿司・くら寿司・かっぱ寿司の期間限定フェアをまとめて確認" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icon-512.png" />
  <link rel="stylesheet" href="./styles.css" />
  <title>寿司フェア</title>
</head>
<body>
  <header class="hero">
    <div class="brand-row">
      <img class="app-mark" src="./assets/icon.svg" alt="" />
      <div>
        <p class="eyebrow">TODAY'S SUSHI PICKS</p>
        <h1>寿司フェア</h1>
      </div>
    </div>
    <p class="lead">4大回転寿司の期間限定メニューを、ここだけで。</p>
    <div class="status-row">
      <span id="updatedAt">更新確認中…</span>
      <button id="refreshBtn" type="button" aria-label="最新情報を再読み込み">↻ 更新</button>
    </div>
  </header>

  <main>
    <section class="today-panel" aria-labelledby="todayTitle">
      <div class="section-heading today-heading">
        <div>
          <p class="kicker">TODAY</p>
          <h2 id="todayTitle">今日の回転寿司フェア</h2>
        </div>
        <span id="todayDate"></span>
      </div>
      <div id="todayHighlights" class="today-highlights" aria-live="polite"></div>
    </section>

    <nav id="filters" class="filters" aria-label="チェーン絞り込み">
      <button class="filter active" data-chain="all">すべて</button>
      <button class="filter" data-chain="sushiro">スシロー</button>
      <button class="filter" data-chain="hamazushi">はま寿司</button>
      <button class="filter" data-chain="kurasushi">くら寿司</button>
      <button class="filter" data-chain="kappasushi">かっぱ寿司</button>
    </nav>

    <section aria-labelledby="chainSummaryTitle">
      <div class="section-heading">
        <h2 id="chainSummaryTitle">4社の開催中フェア</h2>
        <span>写真またはカードをタップで公式サイトへ</span>
      </div>
      <div id="summary" class="summary" aria-live="polite"></div>
    </section>
    <section id="cards" class="cards" aria-live="polite"></section>

    <section class="note-card">
      <strong>ご注意</strong>
      <p>商品・価格・販売期間は変更や売り切れになる場合があります。来店前の最終確認は各カードの「公式で確認」から行えます。</p>
    </section>
  </main>

  <footer>公式公開情報をまとめて表示する個人向けビューア</footer>
  <script src="./app.js" type="module"></script>
</body>
</html>
